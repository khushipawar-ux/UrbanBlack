server:
  port: 8084

spring:
  application:
    name: fleet-service

  datasource:
    url: jdbc:postgresql://postgres:5432/urbanblack_fleet
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  kafka:
    bootstrap-servers: kafka:9092

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka

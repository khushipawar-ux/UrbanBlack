server:
  port: 8083

spring:
  application:
    name: driver-service

  kafka:
    bootstrap-servers: kafka:9092

    consumer:
      group-id: driver-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: com.urbanblack.common.dto.EmployeeEventDTO

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  datasource:
    url: jdbc:postgresql://postgres:5432/urbanblack_driver
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: Asia/Kolkata

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# ── JWT Configuration ──────────────────────────────────────────
jwt:
  # Shared secret across all services (must match auth-service and api-gateway)
  secret: "urbanblacksecretkeyurbanblacksecretkey123456"
  # Token validity: 24 hours in milliseconds
  expiration: 86400000

# ── Swagger / OpenAPI ───────────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

# ── Debug Logging (remove after fixing 403) ──────────────────
logging:
  level:
    org.springframework.security: DEBUG
    com.urbanblack.driverservice: DEBUG
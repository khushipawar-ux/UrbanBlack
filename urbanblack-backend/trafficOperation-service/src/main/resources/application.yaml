server:
  port: 8088
  forward-headers-strategy: framework

spring:
  application:
    name: traffic-operations-service

  datasource:
    url: jdbc:postgresql://postgres:5432/traffic_operation_db
    username: postgres
    password: ROOT
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  jackson:
    serialization:
      fail-on-empty-beans: false
      write-dates-as-timestamps: false

# ================= JWT =================
jwt:
  secret: urbanblacksecretkeyurbanblacksecretkey123456
  expiration: 86400000

# ================= EUREKA =================
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true
    hostname: traffic-operations-service
    instance-id: ${spring.application.name}:${server.port}

# ================= FEIGN =================
feign:
  client:
    config:
      default:
        loggerLevel: full
  compression:
    request:
      enabled: true
    response:
      enabled: true

# ================= ACTUATOR =================
management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    health:
      show-details: always

  health:
    db:
      enabled: true

# ================= LOGGING =================
logging:
  level:
    root: INFO
    org.hibernate.SQL: DEBUG
    org.springframework.web: INFO
    org.springframework.security: DEBUG
    com.example.traffice_service: DEBUG
    com.traffic.management: DEBUG

# ================= SWAGGER =================
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method

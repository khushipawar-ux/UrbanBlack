name: urbanblack

# Load shared secrets from .env (never commit .env to git)
# Copy .env.example to .env and fill in real values before running.

services:

  # ================= EUREKA =================
  eureka-server:
    build:
      context: .
      dockerfile: eureka-server/dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - urban-network
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ================= POSTGRES =================
  postgres:
    image: postgres:15
    container_name: postgres
    command: postgres -c 'max_connections=200'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - urban-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ================= ZOOKEEPER =================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    networks:
      - urban-network

  # ================= KAFKA =================
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - urban-network

  # ================= REDIS =================
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - urban-network

  # ================= RABBITMQ =================
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - urban-network
    healthcheck:
      test: [ "CMD-SHELL", "rabbitmq-diagnostics -q ping || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ================= WALLET =================
  wallet-service:
    build:
      context: .
      dockerfile: wallet-service/dockerfile
    ports:
      - "8092:8092"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/urbanblack_wallet
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_RABBITMQ_HOST: rabbitmq
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - urban-network

  # ================= PAYMENT =================
  payment-service:
    build:
      context: .
      dockerfile: payment-service/dockerfile
    ports:
      - "8094:8094"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/urbanblack_payment
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      PAYU_KEY: ${PAYU_KEY:-}
      PAYU_SALT: ${PAYU_SALT:-}
      PAYU_URL: ${PAYU_URL:-https://secure.payu.in/_payment}
    restart: unless-stopped
    networks:
      - urban-network

  # ================= AUTH =================
  auth-service:
    build:
      context: .
      dockerfile: auth-service/dockerfile
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/urbanblack_auth
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - urban-network

  # ================= USER =================
  user-service:
    build:
      context: .
      dockerfile: user-service/dockerfile
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/urbanblack_user
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - urban-network

  # ================= DRIVER =================
  driver-service:
    build:
      context: .
      dockerfile: driver-service/dockerfile
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/urbanblack_driver
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - urban-network

  # ================= RIDE =================
  ride-service:
    build:
      context: .
      dockerfile: ride-service/dockerfile
    ports:
      - "8089:8089"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/urbanblack_ride
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:-urbanblacksecretkeyurbanblacksecretkey123456}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
    restart: unless-stopped
    networks:
      - urban-network

  # ================= EMPLOYEE =================
  employee-details-service:
    build:
      context: EmployeeDetails-Service
      dockerfile: Dockerfile
    ports:
      - "8086:8086"
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/employee_details_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_MAIL_USERNAME: urbanblack63@gmail.com
      SPRING_MAIL_PASSWORD: "nann lrpz uapw zslo"
      QUICKKYC_SERVICE_URL: http://quickkyc-service:8087
    networks:
      - urban-network

  # ================= TRAFFIC =================
  traffic-operations-service:
    build:
      context: trafficOperation-service
      dockerfile: Dockerfile
    ports:
      - "8088:8088"
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/traffic_operation_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - urban-network

  # ================= API GATEWAY =================
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/dockerfile
    ports:
      - "8080:8080"
    depends_on:
      eureka-server:
        condition: service_healthy
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_CLOUD_GATEWAY_DISCOVERY_LOCATOR_ENABLED: "true"
    networks:
      - urban-network

  # ================= FLEET =================
  fleet-service:
    build:
      context: .
      dockerfile: fleet-service/dockerfile
    container_name: fleet-service
    ports:
      - "8084:8084"
    depends_on:
      - eureka-server
      - postgres
      - kafka
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/urbanblack_fleet
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - urban-network

  # ================= CAB =================
  cab-service:
    build:
      context: cab-registeration-service
      dockerfile: Dockerfile
    ports:
      - "8085:8085"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cab_registration_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      JWT_SECRET: urbanblacksecretkeyurbanblacksecretkey123456
    networks:
      - urban-network

  # ================= QUICKKYC =================
  quickkyc-service:
    build:
      context: quickKyc-service
      dockerfile: Dockerfile
    ports:
      - "8087:8087"
    depends_on:
      eureka-server:
        condition: service_healthy
    environment:
      SERVER_PORT: 8087
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - urban-network

  # ================= NOTIFICATION =================
  notification-service:
    build:
      context: notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - "8091:8091"
    depends_on:
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/notification_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_MAIL_USERNAME: urbanblack63@gmail.com
      SPRING_MAIL_PASSWORD: "nann lrpz uapw zslo"
    networks:
      - urban-network

networks:
  urban-network:
    driver: bridge

volumes:
  postgres_data: